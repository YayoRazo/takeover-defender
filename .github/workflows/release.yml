name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build x64
        run: dotnet build TakeoverDefender.csproj -c Release --nologo

      - name: Build x86
        run: dotnet build TakeoverDefender.csproj -c Release_x86 --nologo

      - name: Test
        run: dotnet test --nologo --verbosity normal

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path Properties\AssemblyInfo.cs 'AssemblyInformationalVersion\("(\d+\.\d+\.\d+)"').Matches.Groups[1].Value
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v4
        with:
          name: TakeoverDefender-x64
          path: bin\Release\net48\TakeoverDefender.exe
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: TakeoverDefender-x86
          path: bin\Release_x86\net48\TakeoverDefender.exe
          if-no-files-found: error

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.version }}
          files: |
            bin\Release\net48\TakeoverDefender.exe
            bin\Release_x86\net48\TakeoverDefender.exe
          generate_release_notes: true
